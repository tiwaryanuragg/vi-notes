version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: vi-notes-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: vi_notes
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro

volumes:
  mongo_data:
